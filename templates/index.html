<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FF14 Gil Scanner</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <main class="container">
    <h1>FF14市場搜尋</h1>

    <form class="filters" method="get" action="/">
      <label>
        伺服器
        <input type="text" name="world" value="{{ world }}">
      </label>
      <label>
        最低預期收益
        <input type="number" step="1" name="min_profit" value="{{ min_profit }}">
      </label>
      <label>
        最低每日銷量
        <input type="number" step="0.1" name="min_sales_per_day" value="{{ min_sales_per_day }}">
      </label>
      <label>
        排名數量
        <input type="number" step="1" name="limit" value="{{ limit }}">
      </label>
      <label>
        配方數量限制
        <input type="number" step="1" name="limit_recipes" value="{{ limit_recipes }}">
      </label>
      <button type="submit">查詢</button>
    </form>

    <form method="post" action="/refresh" class="refresh-form">
      <input type="hidden" name="world" value="{{ world }}">
      <button type="submit" class="secondary">手動 Refresh Cache</button>
    </form>

    <table>
      <thead>
        <tr>
          <th>Item</th>
          <th>Profit(BuyAll)</th>
          <th>Sales/Day</th>
          <th>Listings</th>
          <th>Score</th>
        </tr>
      </thead>
      <tbody>
        {% for row in rows %}
        <tr>
          <td>{{ row.item_name }}</td>
          <td>{{ "%.0f"|format(row.profit_buy_all) }}</td>
          <td>{{ "%.2f"|format(row.sales_per_day) }}</td>
          <td>{{ row.listing_count }}</td>
          <td>{{ "%.0f"|format(row.score) }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </main>
  <section class="status-panel">
    <h2>Cache Refresh Status</h2>
    <div id="refresh-status">載入中...</div>
  </section>
  <script>
  function formatUtcPlus8(input) {
    if (!input || input === '-') return '-';

    const date = new Date(input);
    if (Number.isNaN(date.getTime())) return input;

    const utc8 = new Date(date.getTime() + 8 * 60 * 60 * 1000);

    const yyyy = utc8.getUTCFullYear();
    const mm = String(utc8.getUTCMonth() + 1).padStart(2, '0');
    const dd = String(utc8.getUTCDate()).padStart(2, '0');
    const hh = String(utc8.getUTCHours()).padStart(2, '0');
    const mi = String(utc8.getUTCMinutes()).padStart(2, '0');
    const ss = String(utc8.getUTCSeconds()).padStart(2, '0');

    return `${yyyy}-${mm}-${dd} ${hh}:${mi}:${ss}`;
  }
  async function loadRefreshStatus() {
    try {
      const res = await fetch('/api/refresh-status');
      const data = await res.json();

      const status = data.status ?? 'unknown';
      const world = data.world ?? '-';
      const done = data.done_items ?? 0;
      const total = data.total_items ?? 0;
      const progress = data.progress ?? 0;
      const updatedAt = formatUtcPlus8(data.updated_at);
      const message = data.last_message ?? '';
      const error = data.error ?? '';

      let html = `
        <p><strong>Status:</strong> ${status}</p>
        <p><strong>World:</strong> ${world}</p>
        <p><strong>Progress:</strong> ${done}/${total} (${progress}%)</p>
        <p><strong>Updated:</strong> ${updatedAt}</p>
        <p><strong>Message:</strong> ${message}</p>
      `;

      if (error) {
        html += `<p><strong>Error:</strong> ${error}</p>`;
      }

      document.getElementById('refresh-status').innerHTML = html;
    } catch (err) {
      document.getElementById('refresh-status').innerHTML =
        `<p>讀取 refresh 狀態失敗: ${err}</p>`;
    }
  }

  loadRefreshStatus();
  setInterval(loadRefreshStatus, 5000);
  </script>
</body>
</html>
